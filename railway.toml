[build]
builder = "dockerfile"
dockerfilePath = "infrastructure/docker/Dockerfile.backend"

[deploy]
startCommand = "sh -c 'python scripts/wait_for_db.py || true; alembic upgrade head || true; python -m scripts.seed_demo_data || true; uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
