[build]
builder = "dockerfile"
dockerfilePath = "infrastructure/docker/Dockerfile.backend"

[deploy]
startCommand = "sh -c 'cd backend && alembic upgrade head && python -m scripts.seed_demo_data && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
