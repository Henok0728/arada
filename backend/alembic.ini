[alembic]
# Path to migration scripts — relative to this ini file (backend/)
script_location = app/db/migrations

# Template for new migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Maximum length of the slug portion of the file name
truncate_slug_length = 40

# Add the directory containing this file (backend/) to sys.path so that
# `from app.core.config import settings` works in env.py without needing
# to set PYTHONPATH manually before every alembic command.
prepend_sys_path = .

# Disable SQLAlchemy URL here — we provide it dynamically in env.py
# so that it comes from pydantic-settings and never from this plaintext file.
sqlalchemy.url =

[post_write_hooks]
# Run Black formatter on newly generated migration files (optional)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
